name: project-template
services:
  app:
    build:
      context: .
    container_name: project-template-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: development
      APP_DEBUG: "true"
      APP_URL: http://localhost:8080
      APP_PORT: 8080
      APP_TIMEZONE: Asia/Kolkata
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE:-project_template}
      DB_USER: ${MYSQL_USER:-appuser}
      DB_PASS: ${MYSQL_PASSWORD:-apppassword}
      DB_CHARSET: utf8
      LOG_DIR: storage/logs
      LOG_FILE: app.log
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html:Z
      - vendor_data:/var/www/html/vendor
    restart: unless-stopped

  db:
    image: mysql:8.4
    container_name: project-template-db
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-project_template}
      MYSQL_USER: ${MYSQL_USER:-appuser}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-apppassword}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro,Z
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s
    restart: unless-stopped

volumes:
  db_data:
  vendor_data:
